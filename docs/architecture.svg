<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="JetBrains Mono, monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ff88"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffaa00"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="600" fill="url(#bg)"/>

  <!-- Grid texture -->
  <g opacity="0.03" stroke="#00ff88">
    <line x1="0" y1="100" x2="1100" y2="100"/>
    <line x1="0" y1="200" x2="1100" y2="200"/>
    <line x1="0" y1="300" x2="1100" y2="300"/>
    <line x1="0" y1="400" x2="1100" y2="400"/>
    <line x1="0" y1="500" x2="1100" y2="500"/>
  </g>

  <!-- Title -->
  <text x="550" y="40" fill="#00ff88" font-size="20" text-anchor="middle" font-weight="700" letter-spacing="3">ALPHADRIP · SYSTEM ARCHITECTURE</text>
  <text x="550" y="62" fill="#666" font-size="11" text-anchor="middle" letter-spacing="1">pay-per-signal · sub-cent · settled on arc</text>

  <!-- Hyperliquid data source -->
  <rect x="40" y="110" width="200" height="90" fill="#0e0e0e" stroke="#00d4ff" stroke-width="1"/>
  <text x="140" y="135" fill="#00d4ff" font-size="13" text-anchor="middle" font-weight="600">HYPERLIQUID</text>
  <text x="140" y="155" fill="#aaa" font-size="10" text-anchor="middle">BTC trade tape</text>
  <text x="140" y="172" fill="#666" font-size="9" text-anchor="middle">wss://api.hyperliquid.xyz/ws</text>
  <text x="140" y="188" fill="#666" font-size="9" text-anchor="middle">(public, free, real-time)</text>

  <!-- Cascade engine -->
  <rect x="340" y="110" width="220" height="90" fill="#0e0e0e" stroke="#00ff88" stroke-width="1.5"/>
  <text x="450" y="135" fill="#00ff88" font-size="13" text-anchor="middle" font-weight="600">CASCADE ENGINE</text>
  <text x="450" y="154" fill="#aaa" font-size="10" text-anchor="middle">rolling 30s window</text>
  <text x="450" y="170" fill="#aaa" font-size="10" text-anchor="middle">vol &gt;2.5× · bias &gt;70%</text>
  <text x="450" y="188" fill="#ffaa00" font-size="10" text-anchor="middle" font-style="italic">emits: CascadeSignal</text>

  <!-- Arrow: HL -> Engine -->
  <line x1="240" y1="155" x2="338" y2="155" stroke="#00ff88" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="289" y="148" fill="#666" font-size="9" text-anchor="middle">trades</text>

  <!-- Express + x402 -->
  <rect x="680" y="110" width="260" height="90" fill="#0e0e0e" stroke="#00ff88" stroke-width="1.5"/>
  <text x="810" y="135" fill="#00ff88" font-size="13" text-anchor="middle" font-weight="600">EXPRESS + x402</text>
  <text x="810" y="154" fill="#aaa" font-size="10" text-anchor="middle">GET /signals/latest</text>
  <text x="810" y="170" fill="#ffaa00" font-size="10" text-anchor="middle">gateway.require("$0.003")</text>
  <text x="810" y="188" fill="#666" font-size="9" text-anchor="middle">402 if unpaid · 200 if signed</text>

  <!-- Arrow: Engine -> Express -->
  <line x1="560" y1="155" x2="678" y2="155" stroke="#00ff88" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="619" y="148" fill="#666" font-size="9" text-anchor="middle">signal</text>

  <!-- Consumer -->
  <rect x="680" y="290" width="260" height="90" fill="#0e0e0e" stroke="#ff00aa" stroke-width="1.5"/>
  <text x="810" y="315" fill="#ff00aa" font-size="13" text-anchor="middle" font-weight="600">CONSUMER CLI</text>
  <text x="810" y="334" fill="#aaa" font-size="10" text-anchor="middle">GatewayClient.pay(url)</text>
  <text x="810" y="350" fill="#aaa" font-size="10" text-anchor="middle">EIP-3009 sig offchain</text>
  <text x="810" y="368" fill="#666" font-size="9" text-anchor="middle">polls every 2s · logs JSONL</text>

  <!-- Arrow: x402 <-> Consumer -->
  <line x1="810" y1="200" x2="810" y2="288" stroke="#ffaa00" stroke-width="1.5" marker-end="url(#arr-amber)" marker-start="url(#arr-amber)"/>
  <text x="830" y="240" fill="#ffaa00" font-size="10">402 → sign → 200</text>
  <text x="830" y="255" fill="#666" font-size="9">(per-call x402)</text>

  <!-- Dashboard -->
  <rect x="340" y="290" width="220" height="90" fill="#0e0e0e" stroke="#00d4ff" stroke-width="1"/>
  <text x="450" y="315" fill="#00d4ff" font-size="13" text-anchor="middle" font-weight="600">LIVE DASHBOARD</text>
  <text x="450" y="334" fill="#aaa" font-size="10" text-anchor="middle">WS push · signals + pays</text>
  <text x="450" y="350" fill="#aaa" font-size="10" text-anchor="middle">terminal aesthetic</text>
  <text x="450" y="368" fill="#666" font-size="9" text-anchor="middle">(judges visit this URL)</text>

  <!-- Arrow: Express -> Dashboard (WS) -->
  <path d="M 730 200 Q 640 245 500 290" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="600" y="260" fill="#00d4ff" font-size="9">ws /live</text>

  <!-- Gateway / Circle -->
  <rect x="340" y="440" width="520" height="110" fill="#0e0e0e" stroke="#ffaa00" stroke-width="2"/>
  <text x="600" y="466" fill="#ffaa00" font-size="14" text-anchor="middle" font-weight="700">CIRCLE GATEWAY (BatchFacilitator)</text>
  <text x="600" y="487" fill="#aaa" font-size="11" text-anchor="middle">verify(sig) → lock balance → settle() off-chain instantly</text>
  <text x="600" y="506" fill="#aaa" font-size="11" text-anchor="middle">N authorizations batched → 1 periodic on-chain tx</text>
  <text x="600" y="530" fill="#00ff88" font-size="10" text-anchor="middle" font-style="italic">the primitive that makes $0.003 signals economically viable</text>

  <!-- Arrow: x402 -> Gateway -->
  <line x1="810" y1="380" x2="700" y2="440" stroke="#ffaa00" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <text x="760" y="416" fill="#ffaa00" font-size="9">settle()</text>

  <!-- Arc L1 (external label) -->
  <text x="1050" y="495" fill="#00ff88" font-size="11" text-anchor="end" font-weight="600">ARC L1</text>
  <text x="1050" y="510" fill="#666" font-size="9" text-anchor="end">batched settlement</text>
  <text x="1050" y="523" fill="#666" font-size="9" text-anchor="end">~sub-second finality</text>
  <line x1="860" y1="495" x2="980" y2="495" stroke="#00ff88" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Footer -->
  <text x="550" y="585" fill="#333" font-size="9" text-anchor="middle" letter-spacing="1">alphadrip · agentic commerce on arc · apr 2026</text>
</svg>
